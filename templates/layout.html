<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DomainMonitor 后台</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; margin: 0; background: #f6f8fa; }
    header { background: #24292e; color: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    header a { color: #fff; text-decoration: none; margin-left: 12px; }
    main { max-width: none; width: 100%; margin: 0; background: #fff; padding: 0 0 20px 24px; border: none; border-radius: 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #eee; padding: 8px 6px; text-align: left; }
    .btn { display: inline-block; padding: 6px 10px; border: 1px solid #1b73e8; background: #1b73e8; color: #fff; border-radius: 4px; text-decoration: none; }
    .btn.secondary { background: #fff; color: #1b73e8; }
    .form-row { margin-bottom: 12px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input[type="text"], input[type="number"], input[type="password"] { width: 320px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; }
    input[type="checkbox"] { transform: scale(1.2); }
    .flash { background: #fff8e1; border: 1px solid #ffe082; padding: 10px; border-radius: 4px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <header>
    <div>
      <strong>DomainMonitor 后台</strong>
    </div>
    <nav>
      {% if session.username %}
        <span>欢迎，{{ session.username }}</span>
        <a href="{{ url_for('targets') }}">检测目标</a>
        <a href="{{ url_for('results_search') }}">结果查询</a>
        <a href="{{ url_for('password') }}">修改密码</a>
        <a href="{{ url_for('logout') }}">注销</a>
      {% else %}
        <a href="{{ url_for('login') }}">登录</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for m in messages %}
            <div>{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
