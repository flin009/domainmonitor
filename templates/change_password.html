{% extends "layout.html" %}
{% block content %}
  <h2>修改密码</h2>
  <form method="post" action="{{ url_for('do_password') }}">
    <div class="form-row">
      <label>旧密码</label>
      <input type="password" name="old_password" required>
    </div>
    <div class="form-row">
      <label>新密码</label>
      <input type="password" name="new_password" required>
    </div>
    <div class="form-row">
      <label>确认新密码</label>
      <input type="password" name="confirm_password" required>
    </div>
    <button class="btn" type="submit">更新密码</button>
    <a class="btn secondary" href="{{ url_for('targets') }}">返回</a>
  </form>
{% endblock %}
